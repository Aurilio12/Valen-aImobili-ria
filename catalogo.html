<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valença Imobiliária - CDE | Catálogo</title>
  <meta name="description" content="Catálogo de imóveis em Ciudad del Este com filtros por região, tipo e valor." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="index.html">Valença Imobiliária - CDE</a>
      <nav>
        <a href="index.html">Home</a>
        <a class="active" href="catalogo.html">Catálogo</a>
        <a href="sobre.html">Sobre</a>
        <a href="contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <span class="tag">Catálogo premium</span>
    <h1>Imóveis em Ciudad del Este</h1>
    <p>Filtre por região, tipo de imóvel, valor máximo ou termo de busca.</p>

    <div class="filters" id="catalog-filters">
      <select id="filter-region" class="select">
        <option value="">Todas as regiões</option>
        <option>UCP - San Jose</option>
        <option>UPE KM 7</option>
        <option>Lago UCP</option>
        <option>Outras</option>
      </select>

      <select id="filter-type" class="select">
        <option value="">Todos os tipos</option>
        <option>Apartamento</option>
        <option>Casa</option>
        <option>Outros</option>
      </select>

      <select id="filter-max" class="select">
        <option value="">Sem limite de valor</option>
        <option value="1500000">Até GS 1.500.000</option>
        <option value="200000">Até GS 2.000.000</option>
        <option value="300000">Até GS 3.000.000</option>
        <option value="400000">Até GS 4.000.000</option>
      </select>

      <input id="filter-search" class="input" placeholder="Buscar por título ou descrição" />
    </div>

    <div class="cards" id="catalog-grid"></div>
  </main>

  <footer class="footer">
    <div class="container">Atendimento exclusivo para locação de imoveis.</div>
  </footer>

  <a class="whatsapp-float" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp">✆</a>

  <script src="assets/data/imoveis.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
